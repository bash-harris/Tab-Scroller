<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Organizer</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111826;
      --panel-2: #0f1724;
      --muted: #8a94a6;
      --text: #e8edf7;
      --accent: #8ab4f8;
      --danger: #ea4335;
      --border: rgba(255,255,255,0.08);
      --hover: rgba(255,255,255,0.04);
      --selected: rgba(138,180,248,0.12);
      --input: #172132;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #091019 0%, #0b0f14 100%);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 16, 26, 0.82);
      backdrop-filter: blur(14px);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 260px minmax(220px, 1fr) 260px 240px;
      gap: 12px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .control label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    select, input {
      width: 100%;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .actionbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }

    button {
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #152134;
      color: var(--text);
      padding: 0 14px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.18s ease, border-color 0.18s ease;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-1px);
      background: #1a2940;
      border-color: rgba(138,180,248,0.35);
    }

    button.primary {
      background: rgba(138,180,248,0.14);
      border-color: rgba(138,180,248,0.35);
      color: #dfeaff;
    }

    button.danger {
      background: rgba(234,67,53,0.14);
      border-color: rgba(234,67,53,0.35);
      color: #ffd8d3;
    }

    .list-wrap {
      overflow: auto;
      padding: 10px 22px 18px;
    }

    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bookmark-row {
      display: grid;
      grid-template-columns: 28px 34px minmax(200px, 1fr) minmax(260px, 1.2fr);
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      transition: background 0.16s ease, border-color 0.16s ease;
      cursor: pointer;
    }

    .bookmark-row:hover {
      background: var(--hover);
    }

    .bookmark-row.selected {
      background: var(--selected);
      border-color: rgba(138,180,248,0.32);
    }

    .favicon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(138,180,248,0.12);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
    }

    .favicon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title-cell {
      min-width: 0;
    }

    .title-cell .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-cell .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .url-cell {
      min-width: 0;
      font-size: 12px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      background: rgba(10, 16, 26, 0.82);
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.015);
    }

    .status {
      color: var(--accent);
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Bookmark Organizer</h1>
        <p>Bulk move, filter, and delete bookmarks from any existing folder.</p>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="controls">
      <div class="control">
        <label for="sourceFolder">Source folder</label>
        <select id="sourceFolder"></select>
      </div>

      <div class="control">
        <label for="filterInput">Filter by title / URL text</label>
        <input id="filterInput" type="text" placeholder="Search bookmarks..." />
      </div>

      <div class="control">
        <label for="targetFolder">Target folder</label>
        <select id="targetFolder"></select>
      </div>

      <div class="control">
        <label for="newFolderName">Or create new folder inside target</label>
        <input id="newFolderName" type="text" placeholder="New folder name (optional)" />
      </div>
    </div>

    <div class="actionbar">
      <button id="selectAllBtn">Select all visible</button>
      <button id="clearSelectionBtn">Clear selection</button>
      <button id="refreshBtn">Refresh</button>
      <button id="moveBtn" class="primary">Move selected</button>
      <button id="deleteBtn" class="danger">Delete selected</button>
    </div>

    <div class="list-wrap">
      <div class="bookmark-list" id="bookmarkList"></div>
    </div>

    <div class="footer">
      <div id="counts">0 shown • 0 selected</div>
      <div>Tip: enter a new folder name to create-and-move in one action.</div>
    </div>
  </div>

  <script src="bookmarks.js"></script>
</body>
</html>
